  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,body{height:100%;}\n  body{font-family:'Figtree',system-ui,sans-serif;background:#07061a;color:#eef0ff;}\n  a{color:#48dfe8;} a:hover{color:#8be9ef;}\n  input,select,button{font-family:inherit;}\n  input::placeholder{color:#6b6f9e;}\n  select option{background:#141234;color:#eef0ff;}\n  input[type=number]{-moz-appearance:textfield;}\n  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}\n  ::-webkit-scrollbar{display:none;}\n  @keyframes pop{0%{transform:scale(.82)}60%{transform:scale(1.09)}100%{transform:scale(1)}}\n  @keyframes floatIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}\n  @keyframes twinkle{0%,100%{opacity:.35}50%{opacity:1}}\n  @keyframes glowpulse{0%,100%{box-shadow:0 0 22px rgba(72,223,232,.45),0 12px 30px rgba(0,0,0,.5)}50%{box-shadow:0 0 44px rgba(72,223,232,.8),0 12px 30px rgba(0,0,0,.5)}}\n  @keyframes orbit{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"position:relative;min-height:100dvh;overflow:hidden;background:radial-gradient(130% 100% at 50% -20%, #241a52 0%, #150f38 42%, #0a0722 78%, #07061a 100%);display:flex;justify-content:center;\">\n  <div style=\"position:absolute;inset:0;pointer-events:none;background:radial-gradient(55% 45% at 18% 12%, rgba(123,97,255,.42), transparent 70%),radial-gradient(50% 42% at 86% 24%, rgba(53,208,224,.22), transparent 70%),radial-gradient(65% 55% at 72% 92%, rgba(255,93,143,.22), transparent 70%);\"><\u002Fdiv>\n  <div style=\"position:absolute;inset:-40px;pointer-events:none;background-size:100% 100%;background:radial-gradient(1.5px 1.5px at 8% 9%,#fff,transparent),radial-gradient(2px 2px at 22% 15%,#cfe0ff,transparent),radial-gradient(1px 1px at 35% 6%,#fff,transparent),radial-gradient(1.5px 1.5px at 48% 19%,#fff,transparent),radial-gradient(1px 1px at 61% 10%,#e6ccff,transparent),radial-gradient(2px 2px at 74% 16%,#fff,transparent),radial-gradient(1px 1px at 88% 7%,#fff,transparent),radial-gradient(1.5px 1.5px at 12% 31%,#fff,transparent),radial-gradient(1px 1px at 30% 41%,#cfe0ff,transparent),radial-gradient(1.5px 1.5px at 55% 37%,#fff,transparent),radial-gradient(1px 1px at 81% 33%,#fff,transparent),radial-gradient(2px 2px at 93% 45%,#e6ccff,transparent),radial-gradient(1px 1px at 6% 56%,#fff,transparent),radial-gradient(1.5px 1.5px at 25% 63%,#fff,transparent),radial-gradient(1px 1px at 45% 55%,#cfe0ff,transparent),radial-gradient(1.5px 1.5px at 68% 61%,#fff,transparent),radial-gradient(1px 1px at 86% 67%,#fff,transparent),radial-gradient(2px 2px at 15% 79%,#fff,transparent),radial-gradient(1px 1px at 38% 85%,#e6ccff,transparent),radial-gradient(1.5px 1.5px at 58% 78%,#fff,transparent),radial-gradient(1px 1px at 78% 87%,#fff,transparent),radial-gradient(1.5px 1.5px at 94% 75%,#cfe0ff,transparent),radial-gradient(1px 1px at 50% 95%,#fff,transparent),radial-gradient(1.5px 1.5px at 30% 97%,#fff,transparent);\"><\u002Fdiv>\n  <div style=\"position:absolute;inset:-40px;pointer-events:none;background-size:100% 100%;animation:twinkle 3.4s ease-in-out infinite;background:radial-gradient(2px 2px at 18% 22%,#fff,transparent),radial-gradient(2.5px 2.5px at 66% 12%,#bfe9ff,transparent),radial-gradient(2px 2px at 40% 48%,#fff,transparent),radial-gradient(2.5px 2.5px at 84% 52%,#ffd9ec,transparent),radial-gradient(2px 2px at 10% 70%,#fff,transparent),radial-gradient(2.5px 2.5px at 52% 88%,#d9c7ff,transparent),radial-gradient(2px 2px at 90% 84%,#fff,transparent);\"><\u002Fdiv>\n\n  <button onclick=\"{{ onToggleMute }}\" title=\"Zvuk zapnout / vypnout\" style=\"position:fixed;top:14px;right:14px;z-index:60;display:flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:50%;border:1px solid rgba(123,97,255,.4);background:rgba(20,18,48,.82);color:#c9c2ff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 6px 18px rgba(0,0,0,.4);\">{{ muteIcon }}<\u002Fbutton>\n\n  <sc-if value=\"{{ isSetup }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"position:relative;z-index:1;width:100%;max-width:480px;padding:22px 18px 44px;display:flex;flex-direction:column;\">\n    <div style=\"text-align:center;margin:30px 0 22px;\">\n      <div style=\"width:96px;height:96px;margin:0 auto 8px;position:relative;\">\n        <div style=\"position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 35% 30%, #8be9ef, #6d5bd0 55%, #3a2b7a 100%);box-shadow:0 0 36px rgba(109,91,208,.7),inset -8px -8px 18px rgba(0,0,0,.45);\"><\u002Fdiv>\n        <div style=\"position:absolute;inset:-14px;border-radius:50%;border:2px solid rgba(72,223,232,.35);transform:rotate(-18deg) scaleY(.42);\"><\u002Fdiv>\n        <div style=\"position:absolute;inset:-14px;animation:orbit 6s linear infinite;\"><div style=\"position:absolute;top:50%;left:0;width:9px;height:9px;margin-top:-4px;border-radius:50%;background:#48dfe8;box-shadow:0 0 12px #48dfe8;\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(123,97,255,.14);border:1px solid rgba(123,97,255,.4);padding:7px 15px;border-radius:999px;font:600 11px/1 'Figtree';letter-spacing:.18em;text-transform:uppercase;color:#c9c2ff;\">Vesmírný vědomostní kvíz<\u002Fdiv>\n      <h1 style=\"font:700 44px/1 'Baloo 2';letter-spacing:.5px;margin-top:14px;background:linear-gradient(180deg,#ffffff,#a9b6ff);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 1px 6px rgba(123,97,255,.55));\">Pošli to dál<\u002Fh1>\n      <p style=\"font:500 14px/1.4 'Figtree';margin-top:9px;color:#9aa0d0;\">až 10 hráčů • jeden telefon • napříč galaxií<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:linear-gradient(180deg,rgba(30,26,66,.82),rgba(18,15,44,.82));border:1px solid rgba(123,97,255,.28);border-radius:28px;padding:24px 22px;box-shadow:0 24px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.07);backdrop-filter:blur(12px);\">\n      <h2 style=\"font:600 22px/1 'Baloo 2';color:#eef0ff;margin-bottom:4px;\">Řízení letu<\u002Fh2>\n\n      <label style=\"display:block;font:700 12px/1 'Figtree';color:#8f95c9;letter-spacing:.06em;text-transform:uppercase;margin:20px 0 8px;\">Počet hráčů (1–10)<\u002Flabel>\n      <input type=\"number\" min=\"1\" max=\"10\" value=\"{{ pcount }}\" oninput=\"{{ onPcount }}\" style=\"width:100%;padding:14px;border:1.5px solid rgba(123,97,255,.32);border-radius:14px;font:600 16px 'Figtree';background:rgba(255,255,255,.05);color:#eef0ff;outline:none;\" style-focus=\"border-color:#48dfe8;\">\n\n      <label style=\"display:block;font:700 12px/1 'Figtree';color:#8f95c9;letter-spacing:.06em;text-transform:uppercase;margin:20px 0 8px;\">Vítězné body (kdo dosáhne první, vyhrává)<\u002Flabel>\n      <sc-raw-select value=\"{{ target }}\" onchange=\"{{ onTarget }}\" style=\"width:100%;padding:14px;border:1.5px solid rgba(123,97,255,.32);border-radius:14px;font:600 16px 'Figtree';background:rgba(255,255,255,.05);color:#eef0ff;outline:none;appearance:none;\" style-focus=\"border-color:#48dfe8;\">\n        <option>30<\u002Foption><option>40<\u002Foption><option>50<\u002Foption><option>60<\u002Foption><option>70<\u002Foption><option>80<\u002Foption><option>90<\u002Foption><option>100<\u002Foption>\n      <\u002Fsc-raw-select>\n\n      <label style=\"display:block;font:700 12px/1 'Figtree';color:#8f95c9;letter-spacing:.06em;text-transform:uppercase;margin:20px 0 8px;\">Pořadí otázek<\u002Flabel>\n      <div style=\"display:flex;gap:9px;\">\n        <button type=\"button\" onclick=\"{{ onSeq }}\" style=\"{{ segSeqStyle }}\">Za sebou 1→N<\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ onRand }}\" style=\"{{ segRandStyle }}\">Náhodně<\u002Fbutton>\n      <\u002Fdiv>\n\n      <label style=\"display:block;font:700 12px/1 'Figtree';color:#8f95c9;letter-spacing:.06em;text-transform:uppercase;margin:20px 0 8px;\">Časový limit na tah<\u002Flabel>\n      <div style=\"display:flex;gap:9px;\">\n        <sc-for list=\"{{ timeOpts }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <button type=\"button\" onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <label style=\"display:block;font:700 12px/1 'Figtree';color:#8f95c9;letter-spacing:.06em;text-transform:uppercase;margin:20px 0 8px;\">Začít otázkou číslo<\u002Flabel>\n      <div style=\"{{ startRowStyle }}\">\n        <button type=\"button\" onclick=\"{{ onStartMinus }}\" style=\"width:52px;height:52px;border:none;border-radius:14px;background:linear-gradient(180deg,#7b61ff,#5a44c9);color:#fff;font:600 26px 'Baloo 2';cursor:pointer;flex:0 0 auto;box-shadow:0 0 16px rgba(123,97,255,.5);\">−<\u002Fbutton>\n        <input type=\"number\" min=\"1\" value=\"{{ startNum }}\" oninput=\"{{ onStartNum }}\" style=\"flex:1;text-align:center;padding:14px;border:1.5px solid rgba(123,97,255,.32);border-radius:14px;font:700 18px 'Baloo 2';background:rgba(255,255,255,.05);color:#eef0ff;outline:none;\">\n        <button type=\"button\" onclick=\"{{ onStartPlus }}\" style=\"width:52px;height:52px;border:none;border-radius:14px;background:linear-gradient(180deg,#7b61ff,#5a44c9);color:#fff;font:600 26px 'Baloo 2';cursor:pointer;flex:0 0 auto;box-shadow:0 0 16px rgba(123,97,255,.5);\">+<\u002Fbutton>\n      <\u002Fdiv>\n\n      <label style=\"display:block;font:700 12px/1 'Figtree';color:#8f95c9;letter-spacing:.06em;text-transform:uppercase;margin:20px 0 8px;\">Jména hráčů<\u002Flabel>\n      <div style=\"display:flex;flex-direction:column;gap:9px;\">\n        <sc-for list=\"{{ names }}\" as=\"nm\" hint-placeholder-count=\"3\">\n          <input type=\"text\" placeholder=\"{{ nm.placeholder }}\" value=\"{{ nm.value }}\" oninput=\"{{ nm.onInput }}\" style=\"width:100%;padding:13px 14px;border:1.5px solid rgba(123,97,255,.32);border-radius:14px;font:600 16px 'Figtree';background:rgba(255,255,255,.05);color:#eef0ff;outline:none;\" style-focus=\"border-color:#48dfe8;\">\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <button onclick=\"{{ onStart }}\" style=\"width:100%;padding:17px;border:none;border-radius:16px;font:600 18px 'Baloo 2';background:linear-gradient(90deg,#48dfe8,#7b61ff);color:#fff;cursor:pointer;margin-top:22px;box-shadow:0 0 26px rgba(123,97,255,.55),0 8px 22px rgba(0,0,0,.4);\">🚀 Start mise<\u002Fbutton>\n      <p style=\"font:500 12px/1.5 'Figtree';color:#7c82b5;text-align:center;margin-top:16px;\">Body za správné odpovědi: 1 → 3 → 6 → 10 → 15. Kdykoli můžeš vzít body. Jedna chyba = ztráta bodů z otázky.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isQuiz }}\">\n  <div style=\"position:relative;z-index:1;width:100%;max-width:480px;display:flex;flex-direction:column;min-height:100dvh;\">\n    <div style=\"background:linear-gradient(180deg,rgba(30,26,66,.92),rgba(18,15,44,.55));border-bottom:1px solid rgba(123,97,255,.25);padding:16px 12px 20px;border-radius:0 0 28px 28px;backdrop-filter:blur(10px);\">\n      <div style=\"display:flex;gap:10px;overflow-x:auto;padding:4px 4px 8px;\">\n        <sc-for list=\"{{ players }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <div style=\"{{ p.style }}\">\n            <div style=\"font:700 14px 'Figtree';color:#eef0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;\">{{ p.name }}<\u002Fdiv>\n            <div style=\"font:600 21px 'Baloo 2';color:#fff;margin-top:2px;\">{{ p.score }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"text-align:center;font:600 23px/1.3 'Baloo 2';color:#eef0ff;margin:16px 10px 2px;text-wrap:balance;\">{{ qText }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative;z-index:2;display:flex;justify-content:center;margin-top:22px;\">\n      <div style=\"display:flex;gap:12px;\">\n        <sc-for list=\"{{ ladder }}\" as=\"st\" hint-placeholder-count=\"5\">\n          <div style=\"{{ st.style }}\">{{ st.points }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;display:flex;flex-direction:column;padding:22px 16px 12px;\">\n      <sc-if value=\"{{ isReady }}\">\n        <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;padding-top:6px;\">\n          <div style=\"color:#9aa0d0;font:700 16px 'Figtree';letter-spacing:.02em;\">{{ targetLine }}<\u002Fdiv>\n          <div style=\"margin:auto 0;text-align:center;animation:floatIn .3s ease both;\">\n            <p style=\"color:#9aa0d0;font:500 18px 'Figtree';letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;\">Na řadě je<\u002Fp>\n            <p style=\"font:700 36px/1 'Baloo 2';letter-spacing:.5px;margin-bottom:30px;text-transform:uppercase;background:linear-gradient(180deg,#ffffff,#a9b6ff);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 1px 7px rgba(123,97,255,.6));\">{{ nextName }}<\u002Fp>\n            <button onclick=\"{{ onOk }}\" style=\"width:128px;height:128px;border-radius:50%;border:none;background:radial-gradient(circle at 38% 32%,#8be9ef,#6d5bd0 60%,#4a37a0);color:#fff;font:600 22px 'Baloo 2';cursor:pointer;animation:glowpulse 2.6s ease-in-out infinite;\">{{ okLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n          <button onclick=\"{{ onQuit }}\" title=\"Ukončit hru\" style=\"position:absolute;left:0;bottom:4px;width:60px;height:52px;border:1px solid rgba(123,97,255,.35);border-radius:16px;background:rgba(123,97,255,.14);color:#c9c2ff;font:600 20px 'Baloo 2';cursor:pointer;\">↩<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isPlay }}\">\n        <div style=\"flex:1;display:flex;flex-direction:column;\">\n          <sc-if value=\"{{ showTimer }}\">\n            <div style=\"width:100%;max-width:320px;align-self:center;margin-bottom:14px;\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;font:700 12px 'Figtree';letter-spacing:.1em;text-transform:uppercase;color:#9aa0d0;margin-bottom:6px;\"><span>Čas na odpověď<\u002Fspan><span style=\"{{ timeNumStyle }}\">{{ timeLeft }} s<\u002Fspan><\u002Fdiv>\n              <div style=\"height:9px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;\"><div style=\"{{ timerBarStyle }}\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"align-self:center;background:rgba(123,97,255,.22);border:1px solid rgba(123,97,255,.45);color:#dfe3ff;font:700 14px 'Figtree';padding:7px 18px;border-radius:999px;margin-bottom:16px;white-space:nowrap;\">{{ gainText }}<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n            <sc-for list=\"{{ answers }}\" as=\"a\" hint-placeholder-count=\"10\">\n              <div onclick=\"{{ a.onClick }}\" style=\"{{ a.style }}\">{{ a.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:12px;margin-top:18px;\">\n            <button onclick=\"{{ onQuit }}\" title=\"Ukončit hru\" style=\"width:64px;height:56px;border:1px solid rgba(123,97,255,.35);border-radius:16px;background:rgba(123,97,255,.16);color:#c9c2ff;font:600 22px 'Baloo 2';cursor:pointer;\">↩<\u002Fbutton>\n            <button onclick=\"{{ onTake }}\" style=\"flex:1;border:none;border-radius:16px;background:linear-gradient(180deg,#ffd76a,#f0a63c);color:#3a2600;font:600 18px 'Baloo 2';cursor:pointer;box-shadow:0 0 22px rgba(255,207,92,.5),0 5px 0 #b9781f;\">Pošli to dál →<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"text-align:center;color:#9aa0d0;font:700 15px 'Figtree';padding:14px 0;\">{{ counter }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isResults }}\">\n  <div style=\"position:relative;z-index:1;width:100%;max-width:480px;padding:22px 18px 44px;\">\n    <div style=\"text-align:center;margin:30px 0 18px;\">\n      <div style=\"font:600 12px/1 'Figtree';letter-spacing:.22em;text-transform:uppercase;color:#48dfe8;margin-bottom:10px;\">✦ konec mise ✦<\u002Fdiv>\n      <h1 style=\"font:700 36px 'Baloo 2';letter-spacing:.5px;background:linear-gradient(180deg,#ffffff,#a9b6ff);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 1px 6px rgba(123,97,255,.55));\">{{ resTitle }}<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"background:linear-gradient(180deg,rgba(30,26,66,.82),rgba(18,15,44,.82));border:1px solid rgba(123,97,255,.28);border-radius:28px;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.07);backdrop-filter:blur(12px);\">\n      <div>\n        <sc-for list=\"{{ ranks }}\" as=\"r\" hint-placeholder-count=\"3\">\n          <div style=\"{{ r.rowStyle }}\">\n            <div style=\"{{ r.posStyle }}\">{{ r.medal }}<\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font:600 17px 'Baloo 2';color:#eef0ff;\">{{ r.name }}<\u002Fdiv>\n              <div style=\"{{ r.noteStyle }}\">{{ r.note }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font:600 19px 'Baloo 2';color:#fff;\">{{ r.scoreText }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;margin-top:18px;\">\n        <button onclick=\"{{ onAgain }}\" style=\"flex:1;padding:16px;border:none;border-radius:15px;font:600 17px 'Baloo 2';background:linear-gradient(90deg,#48dfe8,#7b61ff);color:#fff;cursor:pointer;box-shadow:0 0 22px rgba(123,97,255,.5);\">Hrát znovu<\u002Fbutton>\n        <button onclick=\"{{ onReset }}\" style=\"flex:1;padding:16px;border:1px solid rgba(123,97,255,.35);border-radius:15px;font:600 17px 'Baloo 2';background:rgba(255,255,255,.06);color:#eef0ff;cursor:pointer;\">Nová hra<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:900},&quot;enableVoice&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Zvuk&quot;},&quot;enableSound&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Zvuk&quot;}}\">\nclass Component extends DCLogic {\n  C = { green:'#22c98b', red:'#f04d6f', gold:'#ffcf5c', cyan:'#48dfe8', violet:'#7b61ff', text:'#eef0ff', muted:'#9aa0d0' };\n  POINTS = [0,1,3,6,10,15];\n  PALETTE = [\"#7b61ff\",\"#48dfe8\",\"#ff8fb3\",\"#ffcf5c\",\"#5eead4\",\"#c084fc\",\"#60a5fa\",\"#f472b6\",\"#34e0a1\",\"#fca5a5\"];\n  CORRECT_PHRASES = [\"Pěkně, matadore!\",\"Ty jedeš!\",\"Panečku, ty frčíš!\",\"Chodící encyklopedie!\",\"Génius! Klaním se!\",\"Mozek v turbo režimu!\",\"Ty jsi snad spal s Wikipedií!\",\"Profesore, zpomal!\",\"Tebe už nezastaví ani chyták!\",\"Zavolejte Nobelovku!\",\"Tohle už není znalost, ale superschopnost!\",\"Kvíz právě lituje, že tě pustil ke hře!\",\"Ty máš odpověď dřív než otázku!\",\"Mozkovna jede na plný výkon!\",\"Absolutní demolice kvízu!\",\"Google si od tebe chodí pro rady!\",\"Člověk, nebo vědomostní robot?\",\"Tady už začíná být něco podezřelé!\",\"Ty ses narodil s tahákem v hlavě!\",\"Kvíz nemá šanci!\",\"Mozek ostrý jako břitva!\",\"Ty víš i to, co ještě nebylo objeveno!\",\"Tohle už je vědomostní masakr!\",\"Klobouk dolů, mistře!\",\"Tobě snad otázky samy napovídají!\",\"Vědomostní terminátor!\",\"Ty válcuješ jednu otázku za druhou!\",\"Mozek hlásí maximální výkon!\",\"Takhle se drtí konkurence!\",\"Vesmír má nového génia!\",\"Ty máš hlavu jako pátrací balón!\",\"Tohle už je vyšší liga!\",\"Otázky před tebou padají samy!\",\"Ty ses dneska opravdu vyspal do moudra!\",\"Mozek jede bez brzd!\",\"Kvíz dostává pořádně na frak!\",\"T rect,locked}); }\n    else { answers[i].state='wrong'; this.clearTimer(); answers.forEach(x=>{ if(x.state!=='correct'&&x.state!=='wrong')x.state='dim'; });\n      this.soundWrong(); this.setState({answers,busted:true,locked:true}); } }\n\n  endAndPass(){ this.clearTimer(); this.soundSlide(); const s=this.state; const points=s.busted?0:this.POINTS[s.correct];\n    const scores=s.scores.slice(); scores[s.cur]+=points; let winner=s.winner, finishing=s.finishing;\n    if(winner===-1 && scores[s.cur]>=parseInt(s.target)){ winner=s.cur; finishing=true; }\n    this.advance(scores,winner,finishing); }\n\n  advance(scores,winner,finishing){ let cur=this.state.cur+1; let round=this.state.round;\n    let order=this.state.order, ptr=this.state.ptr, q=this.state.q, qnum=this.state.qnum;\n    if(cur>=this.state.players.length){ cur=0;\n      if(finishing){ this.setState({scores,winner,finishing},()=>this.showResults(false)); return; }\n      round++; const d=this.drawFrom(order,ptr); order=d.order; ptr=d.ptr; q=d.q; qnum=d.qnum; }\n    this.setState({ scores, winner, finishing, cur, round, order, ptr, q, qnum, phase:'ready', correct:0, busted:false, locked:false, answers:[] }); }\n\n  showResults(early){ this.clearTimer(); this.setState({screen:'results',resultEarly:early}); }\n\n  playAgain(){ const scores=this.state.players.map(()=>0); const {order,ptr}=this.buildOrder(); const d=this.drawFrom(order,ptr);\n    this.setState({ screen:'quiz', scores, cur:0, round:1, winner:-1, finishing:false, started:false, order:d.order, ptr:d.ptr, q:d.q, qnum:d.qnum, phase:'ready', correct:0, busted:false, locked:false, answers:[] }); }\n\n  /* ---------- render ---------- */\n  renderVals(){\n    const s=this.state, C=this.C;\n    const seg=(active)=>({flex:1,padding:'13px 8px',borderRadius:'14px',border:active?('1.5px solid '+C.cyan):'1.5px solid rgba(123,97,255,.3)',background:active?'linear-gradient(180deg,#7b61ff,#5a44c9)':'rgba(255,255,255,.05)',color:active?'#fff':'#c9c2ff',boxShadow:active?'0 0 16px rgba(123,97,255,.5)':'none',font:\"700 15px 'Figtree'\",cursor:'pointer'});\n    const startDisabled=(s.mode==='rand');\n    const segT=(active)=>({flex:1,padding:'12px 4px',borderRadius:'14px',border:active?('1.5px solid '+C.cyan):'1.5px solid rgba(123,97,255,.3)',background:active?'linear-gradient(180deg,#7b61ff,#5a44c9)':'rgba(255,255,255,.05)',color:active?'#fff':'#c9c2ff',boxShadow:active?'0 0 16px rgba(123,97,255,.5)':'none',font:\"700 14px 'Figtree'\",cursor:'pointer'});\n    const timeOpts=[[60,'1 min'],[120,'2 min'],[0,'Neomezeně']].map(o=>({ label:o[1], onClick:()=>this.setState({timeLimit:o[0]}), style:segT(s.timeLimit===o[0]) }));\n    const tLow=s.timeLeft<=6;\n    const tPct=s.timeLimit?Math.max(0,(s.timeLeft/s.timeLimit)*100):0;\n    const timerBarStyle={ height:'100%', width:tPct+'%', borderRadius:'999px', transition:'width 1s linear', background:tLow?'linear-gradient(90deg,#ff7aa4,#f04d6f)':'linear-gradient(90deg,#48dfe8,#7b61ff)', boxShadow:tLow?'0 0 12px rgba(240,77,111,.6)':'0 0 12px rgba(72,223,232,.5)' };\n    const timeNumStyle={ font:\"700 15px 'Baloo 2'\", color:tLow?'#ff8fb3':'#dfe3ff', fontVariantNumeric:'tabular-nums' };\n\n    const names=s.names.map((v,i)=>({ value:v, placeholder:'Hráč '+(i+1), onInput:(e)=>this.setName(i,e.target.value) }));\n\n    // quiz derived\n    const players=s.players.map((name,i)=>{ const accent=this.PALETTE[i%this.PALETTE.length]; const act=i===s.cur; return { name, score:s.scores[i],\n      style:{ flex:'0 0 auto', minWidth:'92px', borderRadius:'16px', padding:'12px 10px', textAlign:'center',\n        background:act?('linear-gradient(180deg,'+accent+'33,'+accent+'14)'):'rgba(255,255,255,.05)',\n        border:'1.5px solid '+(act?accent:'rgba(140,150,255,.18)'),\n        boxShadow:act?('0 0 18px '+accent+'66'):'none' } }; });\n\n    const ladder=[1,2,3,4,5].map(i=>{ const on=i<=s.correct; return { points:this.POINTS[i],\n      style:{ width:'52px', height:'52px', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',\n        font:\"600 20px 'Baloo 2'\", transition:'.2s',\n        background:on?'radial-gradient(circle at 38% 32%,#ffe08a,#f0a63c)':'rgba(255,255,255,.09)',\n        color:on?'#3a2600':'#b8bce0', border:on?'none':'1px solid rgba(140,150,255,.32)',\n        boxShadow:on?'0 0 20px rgba(255,207,92,.6)':'none', animation:on?'pop .3s':'none' } }; });\n\n    const answers=s.answers.map((a,i)=>{ let bg='rgba(255,255,255,.06)', col='#dfe3ff', bd='1px solid rgba(140,150,255,.24)', sh='none', cur='pointer', anim='none';\n      if(a.state==='correct'){ bg='linear-gradient(180deg,#4ff0b0,#1fb884)'; col='#03251a'; bd='none'; sh='0 0 22px rgba(52,224,161,.55)'; anim='pop .3s'; }\n      else if(a.state==='wrong'){ bg='linear-gradient(180deg,#ff7aa4,#f04d6f)'; col='#fff'; bd='none'; sh='0 0 22px rgba(240,77,111,.55)'; anim='pop .3s'; }\n      else if(a.state==='dim'){ bg='rgba(255,255,255,.03)'; col='#5b6090'; bd='1px solid rgba(140,150,255,.1)'; sh='none'; cur='default'; }\n      return { idx:i, label:a.flipped?a.exp:a.text, onClick:()=>this.pick(i),\n        style:{ display:'flex', alignItems:'center', justifyContent:'center', textAlign:'center', minHeight:'74px', padding:'12px 10px',\n          borderRadius:'18px', font:(a.flipped?\"italic 600 13px\":\"700 16px\")+\" 'Figtree'\", lineHeight:1.25,\n          cursor:cur, background:bg, color:col, boxShadow:sh, border:bd, transition:'.15s', animation:anim } }; });\n\n    // results derived\n    const order=s.players.map((p,i)=>({p,s:s.scores[i],i})).sort((a,z)=>z.s-a.s);\n    const winnerIdx=s.winner!==-1?s.winner:(order[0]?order[0].i:0);\n    const provisional=s.resultEarly && s.winner===-1;\n    const ranks=order.map((o,i)=>{ const isWin=o.i===winnerIdx && !provisional; const isTarget=o.i===s.winner;\n      return { name:o.p, scoreText:o.s+' b', medal:isWin?'🏆':String(i+1), note:isTarget?'první dosáhl cíle':'',\n        rowStyle:{ display:'flex', alignItems:'center', gap:'12px', padding:'13px 14px', borderRadius:'14px', marginBottom:'9px',\n          background:isWin?'rgba(255,207,92,.12)':'rgba(255,255,255,.05)', border:isWin?'1.5px solid rgba(255,207,92,.55)':'1px solid rgba(140,150,255,.16)',\n          boxShadow:isWin?'0 0 22px rgba(255,207,92,.35)':'none' },\n        posStyle:{ width:'38px', height:'38px', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',\n          flex:'0 0 auto', font:\"600 16px 'Baloo 2'\", background:isWin?'radial-gradient(circle at 38% 32%,#ffe08a,#f0a63c)':'linear-gradient(180deg,#7b61ff,#5a44c9)', color:isWin?'#3a2600':'#fff' },\n        noteStyle:{ display:isTarget?'block':'none', font:\"600 12px 'Figtree'\", color:'#9aa0d0', marginTop:'2px' } }; });\n\n    return {\n      isSetup:s.screen==='setup', isQuiz:s.screen==='quiz', isResults:s.screen==='results',\n      // setup\n      pcount:s.pcount, target:s.target, startNum:s.startNum, names,\n      onPcount:(e)=>this.setPcount(e.target.value),\n      onTarget:(e)=>this.setState({target:e.target.value}),\n      onSeq:()=>this.setState({mode:'seq'}), onRand:()=>this.setState({mode:'rand'}), timeOpts,\n      showTimer:s.phase==='play'&&s.timeLimit>0, timeLeft:s.timeLeft, timerBarStyle, timeNumStyle,\n      muted:s.muted, onToggleMute:()=>this.setState({muted:!s.muted}), muteIcon:s.muted?'🔇':'🔊',\n      segSeqStyle:seg(s.mode==='seq'), segRandStyle:seg(s.mode==='rand'),\n      startRowStyle:{ display:'flex', gap:'9px', alignItems:'center', opacity:startDisabled?0.4:1, pointerEvents:startDisabled?'none':'auto' },\n      onStartMinus:()=>this.setStartNum(s.startNum-1), onStartPlus:()=>this.setStartNum(s.startNum+1),\n      onStartNum:(e)=>this.setStartNum(e.target.value),\n      onStart:()=>this.startGame(),\n      // quiz\n      players, qText:s.q?s.q.q:'…', ladder,\n      isReady:s.phase==='ready', isPlay:s.phase==='play',\n      targetLine:'Cílové skóre: '+s.target, nextName:s.players[s.cur]||'HRÁČ', okLabel:s.started?'OK':'Začít hru',\n      gainText:'Zisk z otázky: '+this.POINTS[s.correct]+' b', counter:'Otázka '+s.qnum+' / '+this.questions.length,\n      answers, onOk:()=>this.startTurn(), onTake:()=>this.endAndPass(), onQuit:()=>this.showResults(true),\n      // results\n      resTitle:provisional?'PRŮBĚŽNÉ POŘADÍ':'VÍTĚZ', ranks, onAgain:()=>this.playAgain(), onReset:()=>this.setState({screen:'setup'})\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
